# Sveltia CMS configuration for Aviara Design Co.
#
# Sveltia is a drop-in replacement for Decap CMS — same config schema, same Git
# backend, better UX. Auth uses DecapBridge so editors log in via email magic
# link instead of needing GitHub credentials.
#
# Customize collections below as Aviara's content shape solidifies.

# DecapBridge PKCE auth — editor logs in via email magic link (Google / Microsoft /
# password supported by DecapBridge). UUID ffc07cc9-... was generated when the site
# was registered at https://decapbridge.com.
backend:
  name: git-gateway
  repo: Woollbert/AviaraDesignCo
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/ffc07cc9-158d-4391-a772-6cd16bfd44fe/pkce
  auth_token_endpoint: /sites/ffc07cc9-158d-4391-a772-6cd16bfd44fe/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: 'Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    update: 'Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    delete: 'Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    uploadMedia: 'Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    deleteMedia: 'Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    openAuthoring: 'Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge'

# Surface DecapBridge identity claims so commits get authored as the editor.
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Branded login screen artwork.
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Point the media library at Aviara's existing /images/ folder so the editor
# can pick from the staged-home shots already in the repo (plus add new ones).
media_folder: aviara-site/public/images
public_folder: /images

site_url: https://aviaradesignco.com
display_url: https://aviaradesignco.com

# Single-step publishing flow — owner clicks Publish and it commits + deploys
# immediately. No draft/review state. Matches ACA's setup.
publish_mode: simple

collections:
  # ==========================================================================
  # Site Settings — identity, contact, social, hours, areas served
  # ==========================================================================
  - name: settings
    label: Site Settings
    description: 'Business name, tagline, phone, email, hours, social links, service areas.'
    files:
      - name: site
        label: Site Info
        file: aviara-site/src/content/site.json
        format: json
        editor: { preview: false }
        fields:
          - { name: name, label: Business Name, widget: string }
          - { name: shortName, label: Short Name (for menus), widget: string }
          - { name: tagline, label: Tagline, widget: string }
          - { name: description, label: Site Description (used in SEO), widget: text }
          - { name: url, label: Live URL, widget: string }
          - { name: phone, label: Phone (display), widget: string, hint: 'e.g. (949) 697-1618' }
          - { name: phoneTel, label: "Phone (tel link)", widget: string, hint: 'e.g. +19496971618 — used in click-to-call' }
          - { name: email, label: Email, widget: string }
          - { name: smsHref, label: SMS link, widget: string, hint: 'e.g. sms:+19496971618' }
          - { name: licensing, label: Licensing line, widget: string, hint: 'Shown in hero/header' }
          - name: social
            label: Social Links
            widget: object
            fields:
              - { name: instagram, label: Instagram URL, widget: string }
              - { name: facebook, label: Facebook URL, widget: string }
              - { name: yelp, label: Yelp URL, widget: string }
          - name: address
            label: Address
            widget: object
            fields:
              - { name: city, label: City, widget: string }
              - { name: region, label: State/Region (e.g. CA), widget: string }
          - name: serviceAreas
            label: Service Areas (cities served)
            widget: list
            field: { name: area, label: Area, widget: string }
          - name: hours
            label: Business Hours
            widget: list
            summary: '{{day}}: {{time}}'
            fields:
              - { name: day, label: Day(s), widget: string, hint: 'e.g. "Mon to Fri" or "Sat"' }
              - { name: time, label: Hours, widget: string, hint: 'e.g. "By appointment" or "9am–5pm"' }
          - name: hero
            label: Homepage Hero
            widget: object
            hint: 'The big top section visitors see first — background photo, headline, subhead, and CTA buttons.'
            fields:
              - { name: bgImageUrl, label: Background Image, widget: image, choose_url: false, media_library: { config: { multiple: false } } }
              - { name: bgImageAlt, label: Background Image Alt Text, widget: string, hint: 'Describes the photo for screen readers and SEO. One sentence.' }
              - { name: headlineLine1, label: Headline (Line 1), widget: string, hint: 'First line of the big headline. Currently: "Livable luxury,"' }
              - { name: headlineLine2, label: Headline (Line 2 — shown in italic), widget: string, hint: 'Second line, shown italic in brass. Currently: "thoughtfully staged."' }
              - { name: subhead, label: Subhead Paragraph, widget: text }
              - { name: ctaPrimaryLabel, label: Primary Button Label, widget: string, hint: 'e.g. "Begin a Project"' }
              - { name: ctaPrimaryHref, label: Primary Button Link, widget: string, hint: 'e.g. "#contact" (scroll to section) or "/contact"' }
              - { name: ctaSecondaryLabel, label: Secondary Button Label, widget: string }
              - { name: ctaSecondaryHref, label: Secondary Button Link, widget: string }
              - { name: footerLabel, label: Bottom-of-hero label, widget: string, hint: 'Small text in the bottom-left of the hero. Currently: "Serving Southern California"' }
          - name: sections
            label: Homepage Section Copy
            widget: object
            hint: 'The eyebrow, headline, intro paragraph, and decorative image for each homepage section. Edit the words here, not the layout.'
            fields:
              - name: about
                label: About Section
                widget: object
                fields:
                  - { name: eyebrow, label: Eyebrow (small label above headline), widget: string }
                  - { name: headlineLine1, label: Headline (regular text), widget: string }
                  - { name: headlineItalic, label: Headline (italic suffix), widget: string, hint: 'The italic accent at the end. Currently: "live."' }
                  - name: bodyParagraphs
                    label: Body Paragraphs
                    widget: list
                    field: { name: paragraph, label: Paragraph, widget: text }
                  - { name: image, label: Vignette Image (right side), widget: image, choose_url: false, media_library: { config: { multiple: false } } }
                  - { name: imageAlt, label: Vignette Image Alt Text, widget: string }
                  - { name: founderLabel, label: Founder Card Label, widget: string, hint: 'Default: "Founder"' }
              - name: services
                label: Services Section Header
                widget: object
                fields:
                  - { name: eyebrow, label: Eyebrow, widget: string }
                  - { name: headlineLine1, label: Headline (regular), widget: string }
                  - { name: headlineItalic, label: Headline (italic suffix), widget: string }
                  - { name: intro, label: Intro Paragraph, widget: text }
                  - { name: inquireCtaLabel, label: 'Inquire Button Label', widget: string }
                  - { name: inquireCtaHref, label: 'Inquire Button Link', widget: string }
              - name: process
                label: Process Section Header
                widget: object
                fields:
                  - { name: eyebrow, label: Eyebrow, widget: string }
                  - { name: headlineLine1, label: Headline (regular), widget: string }
                  - { name: headlineItalic, label: Headline (italic suffix), widget: string }
                  - { name: intro, label: Intro Paragraph, widget: text }
                  - { name: bgImage, label: Background Image (washed-out behind dark gradient), widget: image, choose_url: false, media_library: { config: { multiple: false } } }
              - name: team
                label: Team Section Header
                widget: object
                fields:
                  - { name: eyebrow, label: Eyebrow, widget: string }
                  - { name: headlineLine1, label: Headline (regular), widget: string }
                  - { name: headlineItalic, label: Headline (italic suffix), widget: string }
                  - { name: intro, label: Intro Paragraph, widget: text }
              - name: portfolio
                label: Portfolio Section Header
                widget: object
                fields:
                  - { name: eyebrow, label: Eyebrow, widget: string }
                  - { name: headlineLine1, label: Headline (regular), widget: string }
                  - { name: headlineItalic, label: Headline (italic suffix), widget: string }
                  - { name: intro, label: Intro Paragraph (right-aligned, short), widget: text }
              - name: testimonials
                label: Testimonials Section Header
                widget: object
                fields:
                  - { name: eyebrow, label: Eyebrow, widget: string }
                  - { name: headlineLine1, label: Headline (regular), widget: string }
                  - { name: headlineItalic, label: Headline (italic suffix), widget: string }
                  - { name: image, label: Vignette Image (left side), widget: image, choose_url: false, media_library: { config: { multiple: false } } }
                  - { name: imageAlt, label: Vignette Image Alt Text, widget: string }
              - name: contact
                label: Contact Section Header
                widget: object
                fields:
                  - { name: eyebrow, label: Eyebrow, widget: string }
                  - { name: headlineLine1, label: Headline (regular), widget: string }
                  - { name: headlineItalic, label: Headline (italic suffix), widget: string }
                  - { name: intro, label: Intro Paragraph, widget: text }

  # ==========================================================================
  # Services — the 4 service offerings + stats shown on the homepage
  # ==========================================================================
  - name: services
    label: Services
    description: 'Service offerings (Vacant Staging, Interior Design, etc.) and the stat row.'
    files:
      - name: services
        label: Services
        file: aviara-site/src/content/services.json
        format: json
        editor: { preview: false }
        fields:
          - name: items
            label: Service Offerings
            widget: list
            summary: '{{name}}'
            fields:
              - { name: slug, label: URL Slug, widget: string, hint: 'Lowercase, dashes only — e.g. vacant-staging' }
              - { name: name, label: Service Name, widget: string }
              - { name: short, label: Short Description (1 sentence), widget: text }
              - { name: description, label: Full Description, widget: text }
              - name: features
                label: Feature Bullets
                widget: list
                field: { name: feature, label: Feature, widget: string }
              - { name: imageUrl, label: Image, widget: image, choose_url: false, media_library: { config: { multiple: false } } }
              - { name: imageAlt, label: Image Alt Text (for accessibility), widget: string, hint: 'One sentence describing the photo for screen-readers and SEO.' }
          - name: stats
            label: Stats Row (homepage)
            widget: list
            summary: '{{value}} {{label}}'
            fields:
              - { name: value, label: Value, widget: string, hint: 'e.g. "10+" or "< 21"' }
              - { name: label, label: Label, widget: string, hint: 'e.g. "Years Designing"' }

  # ==========================================================================
  # Team — founder bio + supporting team members
  # ==========================================================================
  - name: team
    label: Team
    description: 'Founder bio and supporting team members shown on the homepage.'
    files:
      - name: team
        label: Team
        file: aviara-site/src/content/team.json
        format: json
        editor: { preview: false }
        fields:
          - name: founder
            label: Founder
            widget: object
            fields:
              - { name: name, label: Name, widget: string }
              - { name: role, label: Role, widget: string }
              - { name: bio, label: Bio, widget: text }
              - { name: photoUrl, label: Photo, widget: image, required: false }
          - name: members
            label: Team Members
            widget: list
            summary: '{{name}} — {{role}}'
            fields:
              - { name: name, label: Name, widget: string }
              - { name: role, label: Role, widget: string }
              - { name: bio, label: Bio, widget: text }
              - { name: photoUrl, label: Photo, widget: image, required: false }

  # ==========================================================================
  # Projects — one file per staged home. Each has a full photo gallery shown
  # at /portfolio/<slug>/ and a card on the /portfolio/ index.
  # ==========================================================================
  - name: projects
    label: Projects
    description: 'Each project = one staged home. Add a new project to create a new portfolio page at /portfolio/<slug>/.'
    folder: aviara-site/src/content/projects
    create: true
    slug: '{{slug}}'
    format: json
    summary: '{{title}} — {{category}}'
    editor: { preview: false }
    sortable_fields: [order, title]
    view_groups:
      - { label: By Category, field: category }
    fields:
      - { name: slug, label: URL Slug, widget: string, hint: 'Lowercase, dashes only — e.g. "fallbrook-estate". Becomes /portfolio/<slug>/' }
      - { name: title, label: Project Title, widget: string }
      - { name: location, label: Location, widget: string, hint: 'e.g. "Fallbrook, CA"' }
      - name: category
        label: Category
        widget: select
        options: [Vacant Staging, Occupied Staging, Interior Design]
      - { name: order, label: Display Order, widget: number, value_type: int, default: 99, hint: 'Lower numbers show first on /portfolio/ index. Use 1, 2, 3...' }
      - { name: shortDescription, label: Short Description (1-2 sentences), widget: text, hint: 'Shown on the project detail page as a large pulled quote.' }
      - { name: longDescription, label: Long Description (full paragraph), widget: text }
      - { name: coverImage, label: Cover Image, widget: image, choose_url: false, media_library: { config: { multiple: false } }, hint: 'The hero photo for the project page + the card on /portfolio/.' }
      - { name: coverImageAlt, label: Cover Image Alt Text, widget: string }
      - name: photos
        label: Photo Gallery
        widget: list
        summary: '{{room}} — {{alt | truncate(40)}}'
        hint: 'All photos for this project. Reorder by dragging. Upload via the media library — they save to /images/.'
        fields:
          - { name: url, label: Photo, widget: image, choose_url: false, media_library: { config: { multiple: false } } }
          - { name: alt, label: Alt Text (accessibility), widget: string }
          - name: room
            label: Room
            widget: select
            required: false
            options: [Living, Kitchen, Dining, Bedroom, Bathroom, Office, Outdoor, Entry, Detail, Other]
          - { name: caption, label: Caption (optional), widget: string, required: false }

  # ==========================================================================
  # Testimonials — client quotes shown on the homepage testimonials section
  # ==========================================================================
  - name: testimonials
    label: Testimonials
    description: 'Client quotes shown in the homepage Testimonials section. If multiple, they rotate via the dot navigation.'
    files:
      - name: testimonials
        label: Client Testimonials
        file: aviara-site/src/content/testimonials.json
        format: json
        editor: { preview: false }
        fields:
          - name: items
            label: Testimonials
            widget: list
            summary: '{{author}}'
            fields:
              - { name: quote, label: Quote, widget: text }
              - { name: author, label: Author Name, widget: string }
              - { name: role, label: Role / Context, widget: string, hint: 'e.g. "Real Estate Professional · Temecula, CA · Yelp · 5 stars"' }

  # ==========================================================================
  # City landing pages — one file per city, generates /home-staging-<slug>/
  # ==========================================================================
  - name: cities
    label: City Landing Pages
    description: 'One file per city. Editing here updates the public /home-staging-<slug>/ page. To add a brand new city: create a new entry below AND ask the developer to add the matching route file.'
    folder: aviara-site/src/content/cities
    create: true
    slug: '{{fields.city | lower | replace(" ", "-")}}'
    format: json
    summary: '{{city}} ({{county}})'
    editor: { preview: false }
    sortable_fields: [city]
    fields:
      - { name: slug, label: URL Slug, widget: string, hint: 'Lowercase, dashes only — e.g. "home-staging-temecula". Becomes /<slug>/.' }
      - { name: city, label: City Name, widget: string, hint: 'e.g. "Temecula"' }
      - { name: county, label: County, widget: string, hint: 'e.g. "Riverside County"' }
      - { name: metaTitle, label: SEO Page Title, widget: string, hint: 'Shows in the browser tab + Google search results.' }
      - { name: metaDescription, label: SEO Description, widget: text, hint: 'Shows under the page title in Google search results. Aim for ~150-160 characters.' }
      - { name: h1, label: Page Heading (H1), widget: string, hint: 'The big headline at the top of the page. e.g. "Home Staging in Temecula, CA"' }
      - { name: intro, label: Hero Intro Paragraph, widget: text, hint: 'The paragraph under the H1. Sets up the page.' }
      - name: marketContext
        label: Market Context Paragraphs
        widget: list
        required: false
        hint: 'Optional. 2-3 paragraphs about the local market, buyers, and what makes the city distinct.'
        field: { name: paragraph, label: Paragraph, widget: text }
      - name: whyStaging
        label: 'Why Staging Works Here (3 points)'
        widget: list
        summary: '{{point | truncate(60)}}'
        field: { name: point, label: Point, widget: text }
      - { name: localProof, label: Local Work Blurb, widget: text, hint: 'One paragraph about Aviara projects in this city.' }
      - name: serviceNotes
        label: Per-Service Local Notes
        widget: list
        required: false
        summary: '{{name}}'
        hint: 'Optional. For each service (Vacant Staging, Occupied Staging, Interior Design, Staging Consultations), how it applies in this city.'
        fields:
          - { name: name, label: Service Name, widget: string }
          - { name: note, label: Local Note, widget: text }
      - name: neighborhoods
        label: Neighborhoods Served
        widget: list
        field: { name: name, label: Neighborhood, widget: string }
      - name: commonMistakes
        label: Common Mistakes on Local Listings
        widget: list
        required: false
        summary: '{{title}}'
        hint: 'Optional. Specific mistakes sellers/agents in this city tend to make.'
        fields:
          - { name: title, label: Title, widget: string }
          - { name: body, label: Body, widget: text }
      - name: faqs
        label: FAQs
        widget: list
        summary: '{{question | truncate(60)}}'
        hint: 'Questions homeowners and agents ask. These also become the FAQ schema for Google rich results.'
        fields:
          - { name: question, label: Question, widget: string }
          - { name: answer, label: Answer, widget: text }
      - name: nearbyCitySlugs
        label: Nearby Cities (slugs)
        widget: list
        hint: 'Slugs of 3 nearby cities to cross-link to at the bottom of the page. e.g. "home-staging-murrieta".'
        field: { name: slug, label: Slug, widget: string }

  # ==========================================================================
  # Journal — blog posts at /journal/<slug>/
  # ==========================================================================
  - name: journal
    label: Journal (Blog)
    description: 'Blog posts. Each file generates a page at /journal/<slug>/ and shows on the /journal/ index. Used for SEO + long-form content.'
    folder: aviara-site/src/content/journal
    create: true
    slug: '{{slug}}'
    format: json
    summary: '{{title}} ({{publishedAt}})'
    editor: { preview: false }
    sortable_fields: [publishedAt, title]
    fields:
      - { name: slug, label: URL Slug, widget: string, hint: 'Lowercase, dashes only. Becomes /journal/<slug>/.' }
      - { name: title, label: Title, widget: string }
      - { name: metaTitle, label: SEO Title, widget: string, required: false, hint: 'Defaults to the regular title if blank.' }
      - { name: metaDescription, label: SEO Description, widget: text, hint: 'Shows in Google search results. ~150-160 chars.' }
      - { name: publishedAt, label: Published Date, widget: date, format: 'YYYY-MM-DD' }
      - { name: excerpt, label: Excerpt (shown on /journal/ index), widget: text }
      - { name: coverImage, label: Cover Image (optional), widget: image, required: false, choose_url: false, media_library: { config: { multiple: false } } }
      - name: blocks
        label: Body
        widget: list
        types:
          - name: p
            label: Paragraph
            fields:
              - { name: type, label: Type, widget: hidden, default: 'p' }
              - { name: text, label: Text, widget: text }
          - name: h2
            label: 'Section Heading (H2)'
            fields:
              - { name: type, label: Type, widget: hidden, default: 'h2' }
              - { name: text, label: Text, widget: string }

  # ==========================================================================
  # Process — the 4 process steps + the value proposition bullets
  # ==========================================================================
  - name: process
    label: Process & Values
    description: 'How Aviara works (4 process steps) and why-choose-us value propositions.'
    files:
      - name: process
        label: Process & Values
        file: aviara-site/src/content/process.json
        format: json
        editor: { preview: false }
        fields:
          - name: steps
            label: Process Steps
            widget: list
            summary: '{{number}} — {{title}}'
            fields:
              - { name: number, label: Step Number (display), widget: string, hint: 'e.g. "01"' }
              - { name: title, label: Step Title, widget: string }
              - { name: body, label: Step Description, widget: text }
          - name: valueProps
            label: Value Propositions
            widget: list
            summary: '{{title}}'
            fields:
              - { name: title, label: Title, widget: string }
              - { name: body, label: Body, widget: text }
