# Sveltia CMS configuration for Aviara Design Co.
#
# Sveltia is a drop-in replacement for Decap CMS — same config schema, same Git
# backend, better UX. Auth uses DecapBridge so editors log in via email magic
# link instead of needing GitHub credentials.
#
# Customize collections below as Aviara's content shape solidifies.

# DecapBridge PKCE auth — editor logs in via email magic link (Google / Microsoft /
# password supported by DecapBridge). UUID ffc07cc9-... was generated when the site
# was registered at https://decapbridge.com.
backend:
  name: git-gateway
  repo: Woollbert/AviaraDesignCo
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/ffc07cc9-158d-4391-a772-6cd16bfd44fe/pkce
  auth_token_endpoint: /sites/ffc07cc9-158d-4391-a772-6cd16bfd44fe/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: 'Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    update: 'Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    delete: 'Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    uploadMedia: 'Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    deleteMedia: 'Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    openAuthoring: 'Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge'

# Surface DecapBridge identity claims so commits get authored as the editor.
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Branded login screen artwork.
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

media_folder: aviara-site/public/uploads
public_folder: /uploads

site_url: https://aviaradesignco.com
display_url: https://aviaradesignco.com

# Single-step publishing flow — owner clicks Publish and it commits + deploys
# immediately. No draft/review state. Matches ACA's setup.
publish_mode: simple

collections:
  # ==========================================================================
  # Site Settings — identity, contact, social, hours, areas served
  # ==========================================================================
  - name: settings
    label: Site Settings
    description: 'Business name, tagline, phone, email, hours, social links, service areas.'
    files:
      - name: site
        label: Site Info
        file: aviara-site/src/content/site.json
        format: json
        editor: { preview: false }
        fields:
          - { name: name, label: Business Name, widget: string }
          - { name: shortName, label: Short Name (for menus), widget: string }
          - { name: tagline, label: Tagline, widget: string }
          - { name: description, label: Site Description (used in SEO), widget: text }
          - { name: url, label: Live URL, widget: string }
          - { name: phone, label: Phone (display), widget: string, hint: 'e.g. (949) 697-1618' }
          - { name: phoneTel, label: "Phone (tel link)", widget: string, hint: 'e.g. +19496971618 — used in click-to-call' }
          - { name: email, label: Email, widget: string }
          - { name: smsHref, label: SMS link, widget: string, hint: 'e.g. sms:+19496971618' }
          - { name: licensing, label: Licensing line, widget: string, hint: 'Shown in hero/header' }
          - name: social
            label: Social Links
            widget: object
            fields:
              - { name: instagram, label: Instagram URL, widget: string }
              - { name: facebook, label: Facebook URL, widget: string }
              - { name: yelp, label: Yelp URL, widget: string }
          - name: address
            label: Address
            widget: object
            fields:
              - { name: city, label: City, widget: string }
              - { name: region, label: State/Region (e.g. CA), widget: string }
          - name: serviceAreas
            label: Service Areas (cities served)
            widget: list
            field: { name: area, label: Area, widget: string }
          - name: hours
            label: Business Hours
            widget: list
            summary: '{{day}}: {{time}}'
            fields:
              - { name: day, label: Day(s), widget: string, hint: 'e.g. "Mon to Fri" or "Sat"' }
              - { name: time, label: Hours, widget: string, hint: 'e.g. "By appointment" or "9am–5pm"' }

  # ==========================================================================
  # Services — the 4 service offerings + stats shown on the homepage
  # ==========================================================================
  - name: services
    label: Services
    description: 'Service offerings (Vacant Staging, Interior Design, etc.) and the stat row.'
    files:
      - name: services
        label: Services
        file: aviara-site/src/content/services.json
        format: json
        editor: { preview: false }
        fields:
          - name: items
            label: Service Offerings
            widget: list
            summary: '{{name}}'
            fields:
              - { name: slug, label: URL Slug, widget: string, hint: 'Lowercase, dashes only — e.g. vacant-staging' }
              - { name: name, label: Service Name, widget: string }
              - { name: short, label: Short Description (1 sentence), widget: text }
              - { name: description, label: Full Description, widget: text }
              - name: features
                label: Feature Bullets
                widget: list
                field: { name: feature, label: Feature, widget: string }
              - { name: imageUrl, label: Image, widget: image }
              - { name: imageAlt, label: Image Alt Text (for accessibility), widget: string }
          - name: stats
            label: Stats Row (homepage)
            widget: list
            summary: '{{value}} {{label}}'
            fields:
              - { name: value, label: Value, widget: string, hint: 'e.g. "10+" or "< 21"' }
              - { name: label, label: Label, widget: string, hint: 'e.g. "Years Designing"' }

  # ==========================================================================
  # Team — founder bio + supporting team members
  # ==========================================================================
  - name: team
    label: Team
    description: 'Founder bio and supporting team members shown on the homepage.'
    files:
      - name: team
        label: Team
        file: aviara-site/src/content/team.json
        format: json
        editor: { preview: false }
        fields:
          - name: founder
            label: Founder
            widget: object
            fields:
              - { name: name, label: Name, widget: string }
              - { name: role, label: Role, widget: string }
              - { name: bio, label: Bio, widget: text }
              - { name: photoUrl, label: Photo, widget: image, required: false }
          - name: members
            label: Team Members
            widget: list
            summary: '{{name}} — {{role}}'
            fields:
              - { name: name, label: Name, widget: string }
              - { name: role, label: Role, widget: string }
              - { name: bio, label: Bio, widget: text }
              - { name: photoUrl, label: Photo, widget: image, required: false }

  # ==========================================================================
  # Portfolio — project showcase + client testimonials
  # ==========================================================================
  - name: portfolio
    label: Portfolio
    description: 'Featured project showcase (with photos) and client testimonial quotes.'
    files:
      - name: portfolio
        label: Portfolio
        file: aviara-site/src/content/portfolio.json
        format: json
        editor: { preview: false }
        fields:
          - name: projects
            label: Projects
            widget: list
            summary: '{{title}} — {{location}}'
            fields:
              - { name: slug, label: URL Slug, widget: string, hint: 'Lowercase, dashes only' }
              - { name: title, label: Project Title, widget: string }
              - { name: location, label: Location, widget: string }
              - name: category
                label: Category
                widget: select
                options: [Vacant Staging, Occupied Staging, Interior Design]
              - { name: imageUrl, label: Image, widget: image }
              - { name: imageAlt, label: Image Alt Text, widget: string }
          - name: testimonials
            label: Client Testimonials
            widget: list
            summary: '{{author}}'
            fields:
              - { name: quote, label: Quote, widget: text }
              - { name: author, label: Author, widget: string }
              - { name: role, label: Role / Context, widget: string }

  # ==========================================================================
  # Process — the 4 process steps + the value proposition bullets
  # ==========================================================================
  - name: process
    label: Process & Values
    description: 'How Aviara works (4 process steps) and why-choose-us value propositions.'
    files:
      - name: process
        label: Process & Values
        file: aviara-site/src/content/process.json
        format: json
        editor: { preview: false }
        fields:
          - name: steps
            label: Process Steps
            widget: list
            summary: '{{number}} — {{title}}'
            fields:
              - { name: number, label: Step Number (display), widget: string, hint: 'e.g. "01"' }
              - { name: title, label: Step Title, widget: string }
              - { name: body, label: Step Description, widget: text }
          - name: valueProps
            label: Value Propositions
            widget: list
            summary: '{{title}}'
            fields:
              - { name: title, label: Title, widget: string }
              - { name: body, label: Body, widget: text }
